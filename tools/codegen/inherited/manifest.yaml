# Inherited-behaviour generator — source of truth for the SQL surface that every
# Temporal<T> subclass (TNumber<T> / TSpatial<T>) inherits via late binding +
# lifting (see memory temporal-oo-late-binding-architecture). These files are pure
# wiring to the generic Tspatial_* / Temporal_* wrappers — identical across families
# modulo the type tokens — so they MUST be generated, not hand-maintained per family
# (the per-family hand-drift, e.g. cbuffer 200-bin vs accumulate 150-bin, is the
# irregularity this eliminates).
#
# Canonical within-50-bin POSITION of each inherited file (anchored on the
# cbuffer/geo reference). The emitted filename number = subtype.bin + position, so a
# subtype in any 50-bin gets the same relative layout. (Reconciling the cross-branch
# bin drift fully is tracked separately; this at least emits NEW types correctly.)
positions:
  compops:         4
  spatialfuncs:    5
  topops:          8
  posops:          9
  distance:        10
  aggfuncs:        11
  spatialrels:     12
  tempspatialrels: 14
  indexes:         16
  # Cell-index families split the GiST and SP-GiST opclasses into separate files
  # (the canonical geo/h3 layout); the combined `indexes` above is the cbuffer form.
  gist:            22
  spgist:          23

# Temporal<T> subclasses. `files` lists the inherited behaviours the subtype has
# (a discrete cell-index has no continuous distance / tempspatialrels / spatialfuncs;
# those flags are how the family-reference "surface minus exceptions" is encoded).
subtypes:
  # ---- POC: the new type driving this generator ----
  - temp:  tquadbin
    base:  quadbin
    brief: "temporal QUADBIN cells"
    bin:   350
    category: tspatial
    # A cell-index (like h3) has NO scalar base::stbox cast — drop that block.
    scalar_stbox_cast: false
    stboxes: false
    # compops/posops/topops are generic (topops' scalar cast stripped via the flag
    # above). spatialrels delegates to the geo spatial relationships via the
    # cell→boundary tgeometry conversion (quadbin_cell_to_boundary), the cell-index
    # analogue of th3index 290. GiST/SP-GiST are split (322/323), the canonical
    # cell-index layout (th3index 272/273), not the combined cbuffer `indexes` form.
    files: [compops, posops, topops, spatialrels, gist, spgist]

  # ---- h3: convert the hand-written inherited surface to generated (mirror tquadbin) ----
  - temp:  th3index
    base:  h3index
    # The h3 family directory is `h3`, not the base type name `h3index`.
    fam:   h3
    brief: "temporal H3 cells"
    # pg-h3 cell fns temporalize as t+h3Xxx -> th3CellToBoundary (see memory).
    boundary_fn: th3CellToBoundary
    bin:   250
    category: tspatial
    # A cell-index has NO scalar base::stbox cast — same as tquadbin.
    scalar_stbox_cast: false
    stboxes: false
    files: [compops, posops, topops, spatialrels, gist, spgist]

  # ---- reference families (validate self-regeneration == committed; not new) ----
  - temp:  tcbuffer
    base:  cbuffer
    brief: "temporal circular buffers"
    bin:   200
    category: tspatial
    reference: true
    files: [compops, posops, topops, indexes]

  # ---- converted families: the combined `indexes` opclass file is now generated ----
  # These reproduce the cbuffer reference byte-for-byte (npoint's non-canonical index
  # doc-comment header is normalised to the shared form). Their other inherited files
  # are still hand-maintained and will be migrated incrementally.
  - temp:  tnpoint
    base:  npoint
    brief: "temporal network points"
    bin:   300
    category: tspatial
    # npoint's scalar base::stbox conversions are npoint-specific (Npoint_to_stbox
    # + the extra nsegment/timestamptz/tstzspan variants), so they live in the base
    # file 300_npoint (Conversion between network and space), not the templated
    # cbuffer block; and tnpoint has no trajectory-tiling stboxes functions.
    scalar_stbox_cast: false
    stboxes: false
    files: [compops, posops, topops, indexes]

  - temp:  tpose
    base:  pose
    brief: "temporal poses"
    bin:   100
    category: tspatial
    files: [indexes]

  - temp:  trgeometry
    base:  rgeometry
    fam:   rgeo
    stem:  trgeo
    brief: "temporal rigid geometries"
    bin:   150
    category: tspatial
    # rgeo follows the tgeo-aligned layout, where the combined index file sits at
    # the gist offset (+23 -> 173) rather than the tight scheme's +16.
    positions:
      indexes: 23
    files: [indexes]

# ---------------------------------------------------------------------------
# Box-type axis (C boxops generator). The bounding-box topological operator
# wrappers (overlaps/contains/contained/same/adjacent) are per BOX TYPE, not
# per family: one stbox implementation serves every tspatial family, one tbox
# serves the tnumbers, tstzspan the temporal-only types, tpcbox the pointcloud.
# The generator emits the region between the GENERATED-BOXOPS markers in `file`.
# `reference: true` = self-regen must reproduce the committed region byte-for-byte.
boxtypes:
  - box:       stbox
    tside:     tspatial
    boxc:      STBox
    getarg:    PG_GETARG_STBOX_P
    dispbox:   boxop_tspatial_stbox
    disptt:    boxop_tspatial_tspatial
    ingroup:   mobilitydb_geo_bbox_topo
    boxdesc:   spatiotemporal box
    boxdescpl: spatiotemporal boxes
    valdesc:   spatiotemporal value
    file:      mobilitydb/src/geo/tgeo_boxops.c
    reference: true

  - box:       tpcbox
    tside:     tpointcloud
    boxc:      TPCBox
    getarg:    PG_GETARG_TPCBOX_P
    dispbox:   boxop_tpointcloud_tpcbox
    disptt:    boxop_tpointcloud_tpointcloud
    ingroup:   mobilitydb_pointcloud_temp
    boxdesc:   tpcbox
    boxdescpl: tpcboxes
    valdesc:   temporal pointcloud value
    file:      mobilitydb/src/pointcloud/tpc_boxops.c
    reference: true

  # tstzspan: the box IS a span<timestamptz>, so the primitives are the generic
  # span operators (overlaps_span_span, ...) via prim: span. Serves every
  # temporal-only type (the time-span bounding box).
  - box:       tstzspan
    tside:     temporal
    prim:      span
    boxc:      Span
    getarg:    PG_GETARG_SPAN_P
    dispbox:   boxop_temporal_tstzspan
    disptt:    boxop_temporal_temporal
    ingroup:   mobilitydb_temporal_bbox_topo
    boxdesc:   timestamptz span
    boxdescpl: timestamptz spans
    valdesc:   temporal value
    file:      mobilitydb/src/temporal/temporal_boxops.c
    reference: true

  # tbox: a COMPOSITE box (value span × time). Its own directions dispatch on the
  # tbox primitives (overlaps_tbox_tbox, ...); the `valspan` sub-block adds the
  # value-dimension directions (numspan_tnumber, tnumber_numspan) which dispatch on
  # the generic span primitives (overlaps_span_span, ...) via prim: span — the
  # span<T> value dimension of the tnumber. Shares temporal_boxops.c with tstzspan.
  - box:       tbox
    tside:     tnumber
    prim:      tbox
    boxc:      TBox
    getarg:    PG_GETARG_TBOX_P
    dispbox:   boxop_tnumber_tbox
    disptt:    boxop_tnumber_tnumber
    ingroup:   mobilitydb_temporal_bbox_topo
    boxdesc:   temporal box
    boxdescpl: temporal boxes
    valdesc:   temporal number
    file:      mobilitydb/src/temporal/temporal_boxops.c
    reference: true
    valspan:
      box:       numspan
      prim:      span
      boxc:      Span
      getarg:    PG_GETARG_SPAN_P
      dispbox:   boxop_tnumber_numspan
      boxdesc:   number span
      boxdescpl: number spans

# ---------------------------------------------------------------------------
# Spatial-relationship axis (C spatialrels generator, PG side). The ever/always
# PG wrapper surface (E<Rel>/A<Rel>_<dir> + @sqlfn) is 100% mechanical from
# (predicate, quantifier, direction): each wrapper just dispatches to the MEOS
# ea_<rel>_<dir> kernel with EVER/ALWAYS. The generator emits the region between
# the GENERATED-SPATIALRELS markers in `file`, per predicate, leaving the
# hand-written native kernels (in meos/src) and the irregular tail (touches
# geo/tpoint directions, dwithin_tgeo_tgeo, the array *Pairs surface) untouched.
# `reference: true` = self-regen must reproduce the committed region byte-for-byte.
# Each predicate carries its section banner + the tokens used to derive the
# wrapper name (Rel), the SQL name (sqlfn base) and the @brief verb (verb3).
spatialrel_families:
  - family:    geo_ea_contains_covers
    file:      mobilitydb/src/geo/tgeo_spatialrels.c
    reference: true
    predicates:
      - rel: contains
        Rel: Contains
        banner: "Ever/always contains"
        briefs:
          geo_tgeo:  "a geometry {word} contains a temporal geometry"
          tgeo_geo:  "a temporal geometry {word} contains a geometry"
          tgeo_tgeo: "a temporal geometry {word} contains another one"
      - rel: covers
        Rel: Covers
        banner: "Ever covers"
        briefs:
          geo_tgeo:  "a geometry {word} covers a temporal geometry"
          tgeo_geo:  "a temporal geometry {word} covers a geometry"
          tgeo_tgeo: "a temporal geometry {word} covers another one"

  - family:    geo_ea_disjoint_intersects
    file:      mobilitydb/src/geo/tgeo_spatialrels.c
    reference: true
    predicates:
      - rel: disjoint
        Rel: Disjoint
        banner: "Ever disjoint (for both geometry and geography)"
        briefs:
          geo_tgeo:  "a geometry/geography and a temporal geometry are {word} disjoint"
          tgeo_geo:  "a temporal geometry and a geometry/geography are {word} disjoint"
          tgeo_tgeo: "two temporal geometries are {word} disjoint"
      - rel: intersects
        Rel: Intersects
        banner: "Ever intersects (for both geometry and geography)"
        briefs:
          geo_tgeo:  "a geometry/geography and a temporal geometry {word} intersect"
          tgeo_geo:  "a temporal geometry and a geometry/geography {word} intersect"
          tgeo_tgeo: "two temporal geometries {word} intersect"

  # dwithin's geo/tgeo core: only the two mixed directions are mechanical (the
  # tgeo_tgeo direction has a bespoke distance-carrying dispatcher + a different
  # @ingroup, so it stays hand-written). Both directions share the single MEOS
  # kernel ea_dwithin_tgeo_geo (the dispatcher fixes the argument order), and the
  # dispatcher is the distance-aware EA_dwithin_* rather than EA_spatialrel_*.
  - family:    geo_ea_dwithin
    file:      mobilitydb/src/geo/tgeo_spatialrels.c
    reference: true
    predicates:
      - rel: dwithin
        Rel: Dwithin
        banner: "Ever/always dwithin (for both geometry and geography)\n * The function only accepts points and not arbitrary geometries/geographies"
        directions: [geo_tgeo, tgeo_geo]
        meos_fixed: ea_dwithin_tgeo_geo
        disp:
          geo_tgeo: EA_dwithin_geo_tspatial
          tgeo_geo: EA_dwithin_tspatial_geo
        briefs:
          geo_tgeo:  "a geometry/geography and a temporal geometry are {word} within a distance"
          tgeo_geo:  "a temporal geometry and a geometry/geography are {word} within a distance"
