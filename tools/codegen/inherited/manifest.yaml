# Inherited-behaviour generator — source of truth for the SQL surface that every
# Temporal<T> subclass (TNumber<T> / TSpatial<T>) inherits via late binding +
# lifting (see memory temporal-oo-late-binding-architecture). These files are pure
# wiring to the generic Tspatial_* / Temporal_* wrappers — identical across families
# modulo the type tokens — so they MUST be generated, not hand-maintained per family
# (the per-family hand-drift, e.g. cbuffer 200-bin vs accumulate 150-bin, is the
# irregularity this eliminates).
#
# Canonical within-50-bin POSITION of each inherited file (anchored on the
# cbuffer/geo reference). The emitted filename number = subtype.bin + position, so a
# subtype in any 50-bin gets the same relative layout. (Reconciling the cross-branch
# bin drift fully is tracked separately; this at least emits NEW types correctly.)
positions:
  compops:         4
  spatialfuncs:    5
  topops:          8
  posops:          9
  distance:        10
  aggfuncs:        11
  spatialrels:     12
  tempspatialrels: 14
  indexes:         16
  # Cell-index families split the GiST and SP-GiST opclasses into separate files
  # (the canonical geo/h3 layout); the combined `indexes` above is the cbuffer form.
  gist:            22
  spgist:          23

# Temporal<T> subclasses. `files` lists the inherited behaviours the subtype has
# (a discrete cell-index has no continuous distance / tempspatialrels / spatialfuncs;
# those flags are how the family-reference "surface minus exceptions" is encoded).
subtypes:
  # ---- POC: the new type driving this generator ----
  - temp:  tquadbin
    base:  quadbin
    brief: "temporal QUADBIN cells"
    bin:   350
    category: tspatial
    # A cell-index (like h3) has NO scalar base::stbox cast — drop that block.
    scalar_stbox_cast: false
    # compops/posops/topops are generic (topops' scalar cast stripped via the flag
    # above). spatialrels delegates to the geo spatial relationships via the
    # cell→boundary tgeometry conversion (quadbin_cell_to_boundary), the cell-index
    # analogue of th3index 290. GiST/SP-GiST are split (322/323), the canonical
    # cell-index layout (th3index 272/273), not the combined cbuffer `indexes` form.
    files: [compops, posops, topops, spatialrels, gist, spgist]

  # ---- h3: convert the hand-written inherited surface to generated (mirror tquadbin) ----
  - temp:  th3index
    base:  h3index
    # The h3 family directory is `h3`, not the base type name `h3index`.
    fam:   h3
    brief: "temporal H3 cells"
    # pg-h3 cell fns temporalize as t+h3Xxx -> th3CellToBoundary (see memory).
    boundary_fn: th3CellToBoundary
    bin:   250
    category: tspatial
    # A cell-index has NO scalar base::stbox cast — same as tquadbin.
    scalar_stbox_cast: false
    files: [compops, posops, topops, spatialrels, gist, spgist]

  # ---- reference families (validate self-regeneration == committed; not new) ----
  - temp:  tcbuffer
    base:  cbuffer
    brief: "temporal circular buffers"
    bin:   200
    category: tspatial
    reference: true
    files: [compops, posops, topops, indexes]

  # ---- converted families: the combined `indexes` opclass file is now generated ----
  # These reproduce the cbuffer reference byte-for-byte (npoint's non-canonical index
  # doc-comment header is normalised to the shared form). Their other inherited files
  # are still hand-maintained and will be migrated incrementally.
  - temp:  tnpoint
    base:  npoint
    brief: "temporal network points"
    bin:   301
    category: tspatial
    files: [indexes]

  - temp:  tpose
    base:  pose
    brief: "temporal poses"
    bin:   98
    category: tspatial
    files: [indexes]

  - temp:  trgeometry
    base:  rgeometry
    fam:   rgeo
    stem:  trgeo
    brief: "temporal rigid geometries"
    bin:   146
    category: tspatial
    files: [indexes]
