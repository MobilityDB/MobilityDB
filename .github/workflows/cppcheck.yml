name: Cppcheck

# Runs cppcheck with the build's real -I include paths (via
# compile_commands.json) and publishes the findings to GitHub's Code
# Scanning UI as inline PR annotations. This replaces Codacy's cppcheck,
# which can't be given the build's include paths and therefore drowns
# the finding list with `missingInclude` / `missingIncludeSystem`
# warnings on every #include of a project header.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/cppcheck.yml'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'meos/src/**'
      - 'meos/include/**'
      - 'mobilitydb/src/**'
      - 'mobilitydb/pg_include/**'
  pull_request:
    paths:
      - '.github/workflows/cppcheck.yml'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'meos/src/**'
      - 'meos/include/**'
      - 'mobilitydb/src/**'
      - 'mobilitydb/pg_include/**'

# SARIF upload needs write access to Code Scanning alerts.
permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  cppcheck:
    name: Cppcheck (with project include paths)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies and cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cppcheck \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev
          cppcheck --version

      - name: Configure (generate compile_commands.json)
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DMEOS=on ..

      - name: Run cppcheck (XML output - universally supported)
        # --project uses the same -I paths CMake records for the real
        # build, which is what makes the missingInclude noise vanish.
        # XML is preferred over --output-format=sarif because SARIF
        # support in cppcheck only landed in 2.13+; we convert XML to
        # SARIF ourselves in the next step so the job works regardless
        # of the runner's cppcheck version.
        run: |
          set -x
          cppcheck --version
          cppcheck \
            --project=build/compile_commands.json \
            --enable=warning,style,performance,portability \
            --inline-suppr \
            --suppress='*:*/postgres/*' \
            --suppress='*:*/postgis/*' \
            --suppress='*:*/pgtypes/*' \
            --suppress='missingIncludeSystem' \
            --suppress='unmatchedSuppression' \
            --xml --xml-version=2 \
            -j "$(nproc)" \
            2> cppcheck.xml || true
          echo "--- cppcheck.xml (first 40 lines) ---"
          head -40 cppcheck.xml || true
          test -s cppcheck.xml

      - name: Convert cppcheck XML to SARIF
        run: |
          python3 <<'PYEOF' > cppcheck.sarif
          import sys, json, xml.etree.ElementTree as ET

          # Map cppcheck severities to SARIF level (note: cppcheck
          # uses "error"/"warning"/"style"/"performance"/"portability"
          # /"information"; SARIF has "error"/"warning"/"note"/"none").
          SEV = {
              "error":       "error",
              "warning":     "warning",
              "portability": "warning",
              "performance": "warning",
              "style":       "note",
              "information": "note",
          }

          root = ET.parse("cppcheck.xml").getroot()
          results = []
          rules   = {}

          # <errors><error id=... severity=... msg=...><location .../></error>
          for err in root.iter("error"):
              rid   = err.get("id") or "cppcheck"
              sev   = SEV.get(err.get("severity") or "", "warning")
              msg   = err.get("msg") or err.get("verbose") or rid
              rules[rid] = {
                  "id":   rid,
                  "name": rid,
                  "shortDescription": {"text": err.get("msg") or rid},
                  "defaultConfiguration": {"level": sev},
              }
              for loc in err.findall("location"):
                  # SARIF requires startLine/startColumn >= 1. cppcheck
                  # sometimes emits 0 (no-column-info sentinel); clamp.
                  start_line = max(1, int(loc.get("line") or 1))
                  start_col  = max(1, int(loc.get("column") or 1))
                  results.append({
                      "ruleId":  rid,
                      "level":   sev,
                      "message": {"text": msg},
                      "locations": [{
                          "physicalLocation": {
                              "artifactLocation": {
                                  "uri": loc.get("file") or "unknown",
                              },
                              "region": {
                                  "startLine":   start_line,
                                  "startColumn": start_col,
                              },
                          },
                      }],
                  })

          sarif = {
              "version": "2.1.0",
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name":    "Cppcheck",
                          "version": "reported by cppcheck --version",
                          "informationUri": "https://cppcheck.sourceforge.io/",
                          "rules":   list(rules.values()),
                      },
                  },
                  "results": results,
              }],
          }
          json.dump(sarif, sys.stdout, indent=2)
          PYEOF
          echo "--- cppcheck.sarif (summary) ---"
          python3 -c "
          import json
          d = json.load(open('cppcheck.sarif'))
          res = d['runs'][0]['results']
          print(f'SARIF runs: {len(d[\"runs\"])}, results: {len(res)}')
          counts = {}
          for r in res:
              counts[r['level']] = counts.get(r['level'], 0) + 1
          for k, v in sorted(counts.items()):
              print(f'  {k}: {v}')
          "

      - name: Fail on critical-pattern findings
        # Cppcheck's per-pattern severity is fixed in its built-in
        # classification; we can't promote individual rules to "error"
        # via CLI flags. Instead, post-process cppcheck.xml: if any of
        # the patterns listed below appears in MEOS/MobilityDB code
        # (non-vendored), fail the job. This catches the bug classes
        # that PR #816 fixed (CastIntegerToAddressAtReturn, null
        # dereferences, uninit reads, mistaken `||` vs `&&`, etc.) at
        # the moment they're introduced rather than after they've
        # accumulated on master.
        run: |
          python3 <<'PYEOF'
          import sys, xml.etree.ElementTree as ET

          # Patterns we want to block on. Restricted to the high-precision
          # bug classes — cppcheck's flow-analysis-derived patterns
          # (knownConditionTrueFalse, redundantAssignment) have a high
          # false-positive rate on MEOS code and would block on legacy
          # patterns rather than introduced bugs.
          CRITICAL = {
              "CastIntegerToAddressAtReturn",
              "incorrectLogicOperator",
              "nullPointer",
              "nullPointerRedundantCheck",
              "uninitvar",
              "duplicateExpression",
              "resourceLeak",
              "returnDanglingLifetime",
          }

          # Vendored upstream — already excluded from cppcheck via the
          # --suppress flags, but defence-in-depth here in case a path
          # slips the suppress glob. Cppcheck sometimes reports paths
          # by basename (especially flex/bison-generated files), so we
          # also match a list of vendored basenames.
          VENDORED = ("postgres/", "postgis/", "pgtypes/", "h3-pg/")
          VENDORED_BASENAMES = (
              # liblwgeom flex/bison-generated parsers
              "lwin_wkt_lex.c", "lwin_wkt_lex.l",
              "lwin_wkt_parse.c", "lwin_wkt_parse.y",
          )

          root = ET.parse("cppcheck.xml").getroot()
          violations = []
          for err in root.iter("error"):
              rid = err.get("id", "")
              if rid not in CRITICAL:
                  continue
              for loc in err.iter("location"):
                  path = loc.get("file", "")
                  # Strip leading absolute-path stem if any
                  norm = path.lstrip("/").replace("\\", "/")
                  for prefix in ("home/runner/work/MobilityDB/MobilityDB/",
                                 "github/workspace/"):
                      if norm.startswith(prefix):
                          norm = norm[len(prefix):]
                          break
                  if norm.startswith(VENDORED):
                      continue
                  # Also check basename in case cppcheck stripped path
                  # (happens for flex/bison-generated postgis files).
                  if norm.split("/")[-1] in VENDORED_BASENAMES:
                      continue
                  violations.append((
                      rid, norm, loc.get("line", "?"),
                      err.get("msg", "")[:140]))

          if violations:
              print(f"::error::cppcheck found {len(violations)} critical-pattern violations:")
              for rid, path, line, msg in violations:
                  print(f"::error file={path},line={line}::{rid}: {msg}")
              sys.exit(1)
          print(f"cppcheck: no critical-pattern violations in MEOS/MobilityDB code.")
          PYEOF

      - name: Upload SARIF to GitHub Code Scanning
        # Runs even if the previous step failed, so reviewers can see
        # the inline annotations on the PR alongside the build failure.
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cppcheck.sarif
          category: cppcheck

      - name: Attach SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-sarif
          path: cppcheck.sarif
          retention-days: 30
