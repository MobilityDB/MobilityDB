name: Check code

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/check-code.yml'
      - 'datagen/**'
      - 'doc/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'LICENSE.txt'
    branch_ignore: gh-pages

jobs:
  license_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Requirements
        run: |
          sudo apt install -y licensecheck
      - name: Run License Check
        run: ./tools/scripts/test_license.sh

  csqlfn_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check @csqlfn derivation links
        run: python3 tools/scripts/check_csqlfn.py --gaps
