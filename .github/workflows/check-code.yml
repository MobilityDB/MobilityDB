name: Check code

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/check-code.yml'
      - 'datagen/**'
      - 'doc/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'tools/**'
      - 'LICENSE.txt'
    branches-ignore:
      - gh-pages

jobs:
  portable_aliases_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Portable-operator coverage (every operator classified; 0 unclassified)
        run: python3 tools/codegen/portable_aliases/generate.py --check

  int64_check:
    name: int64 vs int64_t header convention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Reject int64_t / uint64_t in MobilityDB public headers
        run: ./tools/scripts/check_int64_in_headers.sh

  license_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Requirements
        run: |
          sudo apt install -y licensecheck
      - name: Run License Check
        run: ./tools/scripts/test_license.sh

  csqlfn_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check @csqlfn derivation links
        run: python3 tools/scripts/check_csqlfn.py --gaps

  spatialrel_orthogonality_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check spatial-relationship (geo x tgeo) grid completeness
        run: python3 tools/scripts/check_spatialrel_orthogonality.py
