name: Check code

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/check-code.yml'
      - 'datagen/**'
      - 'doc/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'tools/**'
      - 'LICENSE.txt'
    branches-ignore:
      - gh-pages

jobs:
  portable_aliases_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Portable-alias invariants (0 collisions / unresolved / invented / unclassified)
        run: python3 tools/portable_aliases/generate.py --check
      - name: Generated alias SQL is up to date (idempotent)
        run: |
          python3 tools/portable_aliases/generate.py --insrc
          git diff --exit-code -- mobilitydb/sql tools/portable_aliases/verify_equivalence.sql

  int64_check:
    name: int64 vs int64_t header convention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Reject int64_t / uint64_t in MobilityDB public headers
        run: ./tools/scripts/check_int64_in_headers.sh

  license_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Requirements
        run: |
          sudo apt install -y licensecheck
      - name: Run License Check
        run: ./tools/scripts/test_license.sh

  csqlfn_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check @csqlfn derivation links
        run: python3 tools/scripts/check_csqlfn.py --gaps
