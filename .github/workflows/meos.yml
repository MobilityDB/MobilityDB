name: Test MEOS compilation

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/meos.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branch_ignore: gh-pages
  pull_request:
    paths:
      - '.github/workflows/meos.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branch_ignore: gh-pages

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on ..
          make -j $(nproc)
          sudo make install

      - name: Compile and run 01_hello_world.c
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -g -I/usr/local/include -o 01_hello_world 01_hello_world.c -L/usr/local/lib -lmeos
          ./01_hello_world

      - name: Compile and run the tests for the PostgreSQL types
        run: |
          cd meos/test
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -g -I/usr/local/include -o setspan_test setspan_test.c -L/usr/local/lib -lmeos
          ./setspan_test
          gcc -Wall -g -I/usr/local/include -o temporal_test temporal_test.c -L/usr/local/lib -lmeos
          ./temporal_test
          gcc -Wall -g -I/usr/local/include -o geo_test geo_test.c -L/usr/local/lib -lmeos
          ./geo_test
          gcc -Wall -g -I/usr/local/include -o npoint_test npoint_test.c -L/usr/local/lib -lmeos
          ./npoint_test

  threaded:
    name: Thread-safety (TSan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      # Build MEOS with ThreadSanitizer instrumentation. The shared
      # module is linked with -fsanitize=thread so every load of the
      # MEOS_TLS-qualified globals is checked for races.
      - name: Build MEOS with TSan
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on \
            -DCMAKE_C_FLAGS="-fsanitize=thread" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=thread" \
            ..
          make -j $(nproc)
          sudo make install

      - name: Build threaded_test under TSan
        run: |
          cd meos/test
          gcc -Wall -g -O1 -fsanitize=thread \
            -I/usr/local/include -pthread \
            -o threaded_test threaded_test.c \
            -L/usr/local/lib -lmeos

      # Halt-on-error so the job fails on the first reported race.
      - name: Run threaded_test under TSan
        run: |
          cd meos/test
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export TSAN_OPTIONS="halt_on_error=1 second_deadlock_stack=1"
          ./threaded_test 8 5000

  arrow_conformance:
    name: Arrow C Data Interface conformance (opaque, rigid geometry and H3 index types)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev \
            libh3-dev

      # The pgdg libh3-dev package's layout differs between releases —
      # h3api.h has been seen at /usr/include/h3api.h,
      # /usr/include/h3/h3api.h, and (rarely) /usr/include/h3-3/h3api.h.
      # Find both the header and the library at runtime and export them so
      # the cmake step can pin -DH3_INCLUDE_DIR / -DH3_LIBRARY explicitly,
      # sidestepping CMake's find_path / find_library defaults entirely.
      # This mirrors the canonical recipe in pgversion.yml's coverage leg.
      - name: Locate libh3 on disk and pin its paths
        run: |
          dpkg -L libh3-dev || true
          H3_INC=$(dpkg -L libh3-dev | grep -E 'h3api\.h$' | head -1)
          H3_LIB=$(dpkg -L libh3-dev libh3-1 2>/dev/null | grep -E 'libh3\.so$' | head -1)
          if [ -z "$H3_INC" ] || [ -z "$H3_LIB" ]; then
            find /usr -name 'h3api.h' 2>/dev/null
            find /usr -name 'libh3*' 2>/dev/null
            echo "::error::could not locate libh3 headers/library"
            exit 1
          fi
          H3_INC_DIR=$(dirname "$H3_INC")
          echo "H3_INCLUDE_DIR=$H3_INC_DIR" >> $GITHUB_ENV
          echo "H3_LIBRARY=$H3_LIB" >> $GITHUB_ENV
          echo "Found libh3 headers at: $H3_INC_DIR"
          echo "Found libh3 library at: $H3_LIB"

      # Build MEOS with the circular buffer, pose, rigid geometry and H3
      # index subsystems so the opaque LargeBinary value leaf (temporal
      # geometry and geography, both core), the rigid geometry
      # Struct{ref:LargeBinary, pose} value leaf, and the scalar UInt64
      # "L" leaf (temporal H3 index) are exercised. The decomposed
      # circular buffer cases are kept as a regression guard.
      - name: Build MEOS with circular buffers, poses, rigid geometries and H3 indexes
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on \
            -DCBUFFER=on -DPOSE=on -DRGEO=on \
            -DH3=on -DH3_INCLUDE_DIR="$H3_INCLUDE_DIR" \
            -DH3_LIBRARY="$H3_LIBRARY" ..
          make -j $(nproc)
          sudo make install

      # Compile the validator with the vendored dependency-free nanoarrow
      # amalgamation and run it. nanoarrow imports the MEOS-produced
      # ArrowSchema/ArrowArray with no MEOS knowledge and runs full Arrow
      # C Data Interface validation over the whole nested tree, proving the
      # opaque, rigid geometry and H3 index exports are consumable by an
      # external Arrow engine. The installed meos_h3.h includes <h3api.h>,
      # so the pinned H3 include directory is added to the compile line.
      - name: Validate the Arrow export with nanoarrow
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -g -I/usr/local/include -I"$H3_INCLUDE_DIR" \
            -I"$GITHUB_WORKSPACE" \
            -o temporal_arrow_validate temporal_arrow_validate.c \
            "$GITHUB_WORKSPACE/nanoarrow/nanoarrow.c" \
            -L/usr/local/lib -lmeos
          ./temporal_arrow_validate
