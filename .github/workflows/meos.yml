name: Test MEOS compilation

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/meos.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branch_ignore: gh-pages
  pull_request:
    paths:
      - '.github/workflows/meos.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branch_ignore: gh-pages

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on ..
          make -j $(nproc)
          sudo make install

      - name: Compile and run 01_hello_world.c
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -g -I/usr/local/include -o 01_hello_world 01_hello_world.c -L/usr/local/lib -lmeos
          ./01_hello_world

      - name: Compile and run the tests for the PostgreSQL types
        run: |
          cd meos/test
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -g -I/usr/local/include -o setspan_test setspan_test.c -L/usr/local/lib -lmeos
          ./setspan_test
          gcc -Wall -g -I/usr/local/include -o temporal_test temporal_test.c -L/usr/local/lib -lmeos
          ./temporal_test
          gcc -Wall -g -I/usr/local/include -o geo_test geo_test.c -L/usr/local/lib -lmeos
          ./geo_test
          gcc -Wall -g -I/usr/local/include -o npoint_test npoint_test.c -L/usr/local/lib -lmeos
          ./npoint_test

  threaded:
    name: Thread-safety (TSan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      # Build MEOS with ThreadSanitizer instrumentation. The shared
      # module is linked with -fsanitize=thread so every load of the
      # MEOS_TLS-qualified globals is checked for races.
      - name: Build MEOS with TSan
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on \
            -DCMAKE_C_FLAGS="-fsanitize=thread" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=thread" \
            ..
          make -j $(nproc)
          sudo make install

      - name: Build threaded_test under TSan
        run: |
          cd meos/test
          gcc -Wall -g -O1 -fsanitize=thread \
            -I/usr/local/include -pthread \
            -o threaded_test threaded_test.c \
            -L/usr/local/lib -lmeos

      # Halt-on-error so the job fails on the first reported race.
      - name: Run threaded_test under TSan
        run: |
          cd meos/test
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export TSAN_OPTIONS="halt_on_error=1 second_deadlock_stack=1"
          ./threaded_test 8 5000

  arrow_conformance:
    name: Arrow C Data Interface conformance (opaque and rigid geometry types)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      # Build MEOS with the circular buffer, pose and rigid geometry
      # subsystems so the opaque LargeBinary value leaf (temporal
      # geometry and geography, both core) and the rigid geometry
      # Struct{ref:LargeBinary, pose} value leaf are exercised. The
      # decomposed circular buffer cases are kept as a regression guard.
      - name: Build MEOS with circular buffers, poses and rigid geometries
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on \
            -DCBUFFER=on -DPOSE=on -DRGEO=on ..
          make -j $(nproc)
          sudo make install

      # Compile the validator with the vendored dependency-free nanoarrow
      # amalgamation and run it. nanoarrow imports the MEOS-produced
      # ArrowSchema/ArrowArray with no MEOS knowledge and runs full Arrow
      # C Data Interface validation over the whole nested tree, proving the
      # opaque and rigid geometry exports are consumable by an external
      # Arrow engine.
      - name: Validate the Arrow export with nanoarrow
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -g -I/usr/local/include -I"$GITHUB_WORKSPACE" \
            -o temporal_arrow_validate temporal_arrow_validate.c \
            "$GITHUB_WORKSPACE/nanoarrow/nanoarrow.c" \
            -L/usr/local/lib -lmeos
          ./temporal_arrow_validate

  arrow_parquet_endtoend:
    name: Zero-MEOS Arrow and Parquet consumption end to end
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      # pyarrow and duckdb are the strictly-required canonical-mirror
      # enablement for this verification: the zero-MEOS consumer and the
      # cross-check engine. They are the documented Arrow C Data Interface
      # and Parquet tooling the demo verifies against; the demo cannot run
      # without them. The MEOS export kernel is untouched.
      - name: Install the zero-MEOS Arrow and Parquet tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyarrow duckdb

      # Same MEOS build as the conformance job: the producer exercises the
      # decomposed Struct value leaf (temporal geometry point) and the
      # scalar value leaf (temporal float).
      - name: Build MEOS with circular buffers, poses and rigid geometries
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on \
            -DCBUFFER=on -DPOSE=on -DRGEO=on ..
          make -j $(nproc)
          sudo make install

      # The producer is the only MEOS-linked half. It is built as a shared
      # library; the zero-MEOS Python bridge loads it with ctypes so the
      # producer can fill caller-owned ArrowSchema/ArrowArray structs
      # through the conformance-proven meos_temporal_to_arrow kernel.
      - name: Build the MEOS-linked Arrow producer
        run: |
          cd meos/examples
          gcc -Wall -Wextra -fPIC -shared \
            -I/usr/local/include -I"$GITHUB_WORKSPACE" \
            -o libtemporal_arrow_parquet_producer.so \
            temporal_arrow_parquet_producer.c \
            -L/usr/local/lib -lmeos

      # Process 1: the bridge imports every MEOS-produced array purely
      # through pyarrow._import_from_c (the exact path that std::bad_alloc-ed
      # before the #1057 stack-dangling schema-children fix) and writes real
      # multi-row-group Parquet with zero-MEOS parquet-cpp.
      - name: Produce Arrow and write Parquet (pyarrow _import_from_c)
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          python3 temporal_arrow_parquet_bridge.py \
            ./libtemporal_arrow_parquet_producer.so \
            "$RUNNER_TEMP/demo.parquet" \
            "$RUNNER_TEMP/demo_ground_truth.txt"

      # Process 2: a fully separate process with NO libmeos on its library
      # path. It only opens the Parquet files and the MEOS-emitted
      # decomposed ground truth, measures the real row-group pruning on the
      # flat top-level columns, verifies every row value-exact against the
      # MEOS oracle, and cross-checks the prune with duckdb.
      - name: Consume, prune and verify (zero-MEOS process)
        run: |
          cd meos/examples
          unset LD_LIBRARY_PATH
          python3 temporal_arrow_parquet_consumer.py \
            "$RUNNER_TEMP/demo" \
            "$RUNNER_TEMP/demo_ground_truth.txt.decomposed"
