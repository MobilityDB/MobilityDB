name: Main Build

# Test for supported PostgreSQL/PostGIS versions.
# Minimum supported PG is 16 (see mobilitydb/CMakeLists.txt PG_MIN_MAJOR_VERSION).
# 3 (PostgreSQL) * 1 (PostGIS) * 1 (Linux) + 1 (coverage) = 4 jobs are triggered.
# Allow manual trigger

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/pgversion.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branch_ignore: gh-pages
  pull_request:
    paths:
      - '.github/workflows/pgversion.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branch_ignore: gh-pages

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}

    strategy:
        fail-fast: false
        matrix:
          psql: [16, 17, 18]
          postgis: [3]
          os: ["ubuntu-24.04"]
          coverage: [0]
          include:
            - psql: 17
              postgis: 3
              os: "ubuntu-24.04"
              coverage: 1

    steps:
      - uses: actions/checkout@v4

      - name: Remove existing PostgreSQL installations [prefer apt.postgresql.org ]
        run: |
          sudo service postgresql stop || true
          sudo apt-get --purge remove postgresql* -y || true
          sudo rm -rf /var/lib/postgresql/ || true
          sudo rm -rf /etc/postgresql/ || true
          sudo rm -rf /var/log/postgresql/ || true
          echo "Removed existing PostgreSQL installation"

      - name: Set postgresql port as a default
        run: |
          PGP=5432
          echo "PGPORT=${PGP}" >> $GITHUB_ENV        

      - name: Add PostgreSQL APT repository
        run: |
          sudo apt-get install curl ca-certificates gnupg
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt/ \
            $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos++-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev \
            postgresql-${{ matrix.psql }} \
            postgresql-${{ matrix.psql }}-postgis-${{ matrix.postgis }} \
            postgresql-server-dev-${{ matrix.psql }}
          ls /usr/lib/postgresql/${{ matrix.psql }}/lib/
          xzcat --version

      - name: Install coverall dependencies
        if: matrix.coverage == '1'
        run: |
          # postgresql-N-pointcloud so the coverage build can compile
          # -DPOINTCLOUD=ON; without it, meos/src/pointcloud/* (the
          # consumer of pgPointCloud's libpc.a) plus the cross-cutting
          # #if POINTCLOUD blocks in temporal/* are stripped at preprocess
          # time and show as 404/missed on Coveralls. The runtime tests
          # also need the 'pointcloud' PG extension available (CREATE
          # EXTENSION mobilitydb CASCADE will pull it in). pgdg ships
          # postgresql-${VER}-pointcloud for the supported PG versions.
          sudo apt-get -y install lcov \
            postgresql-${{ matrix.psql }}-pointcloud

      - name: Build pgPointCloud from source (for libpc.a)
        if: matrix.coverage == '1'
        run: |
          # MobilityDB's POINTCLOUD=ON build links against pgPointCloud's
          # static lib (pointcloud-pg/lib/libpc.a, produced as a side-
          # effect of the upstream autotools build). The runtime extension
          # we installed above does NOT ship that static archive — only
          # the .so. So clone + build pgPointCloud here just to harvest
          # the libpc.a that meos/src/pointcloud/CMakeLists.txt:114
          # checks for.
          sudo apt-get -y install autoconf automake libtool \
            libxml2-dev pkg-config
          # The pgPointCloud source is vendored at pointcloud-pg/ (tracked
          # in the branch); we just need to run its autotools build to
          # produce the static archive.
          cd pointcloud-pg
          ./autogen.sh
          ./configure \
            --with-pgconfig=/usr/lib/postgresql/${{ matrix.psql }}/bin/pg_config
          make -j $(nproc)
          # Sanity: libpc.a must land where MobilityDB's CMake will look.
          ls -la lib/libpc.a

      - name: Configure for gcc
        run: |
          export PATH=/usr/lib/postgresql/${{ matrix.psql }}/bin:$PATH
          mkdir build
          cd build
          # Coverage matrix entry enables the opt-in subsystems whose
          # sources would otherwise be stripped from the gcov-instrumented
          # build. Non-coverage entries keep the lean default to verify
          # the gating still works. POINTCLOUD=ON requires the
          # pgPointCloud build step earlier in this job.
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DWITH_COVERAGE=${{ matrix.coverage }} \
            ${{ matrix.coverage == '1' && '-DCBUFFER=ON -DPOSE=ON -DRGEO=ON -DPOINTCLOUD=ON' || '' }} \
            ..

      - name: Build
        run: |
          cd build
          make -j 4
          sudo make install

      - name: test install
        run: |
          sudo service postgresql start
          sudo -u postgres createdb -p ${PGPORT}  ___mobdb___test___
          sudo -u postgres psql -p ${PGPORT}  -d ___mobdb___test___ -c "CREATE EXTENSION mobilitydb CASCADE; SELECT postgis_full_version(); SELECT mobilitydb_full_version();"

      - name: Test
        run: |
          cd build
          make test

      - name: Generate coverage
        if: matrix.coverage == '1'
        run: |
          cd build
          # Excluding MEOS-specific and other miscellaneous files
          lcov --capture --directory . --include */mobilitydb/* --include */meos/* --exclude */mobilitydb/postgis/* --exclude */geo_constructors.c --exclude */tpoint_datagen.c --output-file=lcov.info

      - name: Coveralls
        if: matrix.coverage == '1'
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: "./build/lcov.info"
