name: Main Build

# Test for supported PostgreSQL/PostGIS versions.
# Minimum supported PG is 16 (see mobilitydb/CMakeLists.txt PG_MIN_MAJOR_VERSION).
# 3 (PostgreSQL) * 1 (PostGIS) * 1 (Linux) + 1 (coverage) = 4 jobs are triggered.
# Allow manual trigger

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/pgversion.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branch_ignore: gh-pages
  pull_request:
    paths:
      - '.github/workflows/pgversion.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branch_ignore: gh-pages

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}

    strategy:
        fail-fast: false
        matrix:
          psql: [16, 17, 18]
          postgis: [3]
          os: ["ubuntu-24.04"]
          coverage: [0]
          include:
            - psql: 17
              postgis: 3
              os: "ubuntu-24.04"
              coverage: 1

    steps:
      - uses: actions/checkout@v4

      - name: Remove existing PostgreSQL installations [prefer apt.postgresql.org ]
        run: |
          sudo service postgresql stop || true
          sudo apt-get --purge remove postgresql* -y || true
          sudo rm -rf /var/lib/postgresql/ || true
          sudo rm -rf /etc/postgresql/ || true
          sudo rm -rf /var/log/postgresql/ || true
          echo "Removed existing PostgreSQL installation"

      - name: Set postgresql port as a default
        run: |
          PGP=5432
          echo "PGPORT=${PGP}" >> $GITHUB_ENV        

      - name: Add PostgreSQL APT repository
        run: |
          sudo apt-get install curl ca-certificates gnupg
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt/ \
            $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos++-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev \
            postgresql-${{ matrix.psql }} \
            postgresql-${{ matrix.psql }}-postgis-${{ matrix.postgis }} \
            postgresql-server-dev-${{ matrix.psql }}
          ls /usr/lib/postgresql/${{ matrix.psql }}/lib/
          xzcat --version

      - name: Install coverall dependencies
        if: matrix.coverage == '1'
        run: |
          # libh3-dev so the coverage build can compile -DH3=ON; without
          # it, meos/src/h3/* is invisible to gcov and shows as 404 on
          # Coveralls (the actual cause of the apparent coverage gap on
          # h3-introducing PRs, not a real test deficit).
          sudo apt-get -y install lcov libh3-dev

      - name: Locate libh3 on disk and pin its paths
        if: matrix.coverage == '1'
        # The pgdg libh3-dev package's layout differs between releases —
        # h3api.h has been seen at /usr/include/h3api.h, /usr/include/h3/h3api.h,
        # and (rarely) /usr/include/h3-3/h3api.h. Find both header and lib
        # at runtime and export them so the cmake step can pin -DH3_LIBRARY
        # / -DH3_INCLUDE_DIR explicitly, sidestepping CMake's find_path /
        # find_library defaults entirely.
        run: |
          dpkg -L libh3-dev || true
          H3_INC=$(dpkg -L libh3-dev | grep -E 'h3api\.h$' | head -1)
          H3_LIB=$(dpkg -L libh3-dev libh3-1 2>/dev/null | grep -E 'libh3\.so$' | head -1)
          if [ -z "$H3_INC" ] || [ -z "$H3_LIB" ]; then
            find /usr -name 'h3api.h' 2>/dev/null
            find /usr -name 'libh3*' 2>/dev/null
            echo "::error::could not locate libh3 headers/library"
            exit 1
          fi
          H3_INC_DIR=$(dirname "$H3_INC")
          echo "H3_INCLUDE_DIR=$H3_INC_DIR" >> $GITHUB_ENV
          echo "H3_LIBRARY=$H3_LIB" >> $GITHUB_ENV
          echo "Found libh3 headers at: $H3_INC_DIR"
          echo "Found libh3 library at: $H3_LIB"

      - name: Configure for gcc
        run: |
          export PATH=/usr/lib/postgresql/${{ matrix.psql }}/bin:$PATH
          mkdir build
          cd build
          # Coverage matrix entry enables the opt-in subsystems whose
          # sources would otherwise be stripped from the gcov-instrumented
          # build (#if XX blocks preprocessed away, dispatch lines in
          # cross-cutting files appearing as missed). Non-coverage entries
          # keep the lean default to verify the gating still works.
          # When matrix.coverage=1, env.H3_INCLUDE_DIR/H3_LIBRARY were
          # populated by the 'Locate libh3' step; pin them via -D so the
          # find_path / find_library defaults can't miss the layout.
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DWITH_COVERAGE=${{ matrix.coverage }} \
            ${{ matrix.coverage == '1' && format('-DCBUFFER=ON -DPOSE=ON -DRGEO=ON -DH3=ON -DH3_INCLUDE_DIR={0} -DH3_LIBRARY={1}', env.H3_INCLUDE_DIR, env.H3_LIBRARY) || '' }} \
            ..

      - name: Build
        run: |
          cd build
          make -j 4
          sudo make install

      - name: test install
        run: |
          sudo service postgresql start
          sudo -u postgres createdb -p ${PGPORT}  ___mobdb___test___
          sudo -u postgres psql -p ${PGPORT}  -d ___mobdb___test___ -c "CREATE EXTENSION mobilitydb CASCADE; SELECT postgis_full_version(); SELECT mobilitydb_full_version();"

      - name: Test
        run: |
          cd build
          make test

      - name: Generate coverage
        if: matrix.coverage == '1'
        run: |
          cd build
          # Excluding MEOS-specific and other miscellaneous files
          lcov --capture --directory . --include */mobilitydb/* --include */meos/* --exclude */mobilitydb/postgis/* --exclude */geo_constructors.c --exclude */tpoint_datagen.c --output-file=lcov.info

      - name: Coveralls
        if: matrix.coverage == '1'
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: "./build/lcov.info"
