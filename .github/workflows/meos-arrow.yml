name: Test MEOS Arrow export

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/meos-arrow.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branches-ignore:
      - gh-pages
  pull_request:
    paths:
      - '.github/workflows/meos-arrow.yml'
      - 'cmake/**'
      - 'meos/**'
      - 'mobilitydb/**'
      - 'postgis/**'
      - 'CMakeLists.txt'
    branches-ignore:
      - gh-pages

jobs:
  setspan_arrow_conformance:
    name: Closure-type Arrow C Data Interface conformance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      # The set, span, span set, tbox and stbox Arrow export needs only the
      # always-built core; the geometry and geography set base types and the
      # spatiotemporal box use the geo subsystem, which is always compiled.
      - name: Build MEOS
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on -DARROW=on ..
          make -j $(nproc)
          sudo make install

      # Compile the validator with the vendored dependency-free nanoarrow
      # amalgamation and run it. nanoarrow imports the MEOS-produced
      # ArrowSchema/ArrowArray with no MEOS knowledge and runs full Arrow
      # C Data Interface validation over the whole nested tree of every set,
      # span, span set, temporal box and spatiotemporal box variant, proving
      # the closure-type export is consumable by an external Arrow engine.
      - name: Validate the closure-type Arrow export with nanoarrow
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -Werror=implicit-function-declaration -Werror=implicit-int -g -I/usr/local/include -I"$GITHUB_WORKSPACE" \
            -o setspan_arrow_validate setspan_arrow_validate.c \
            "$GITHUB_WORKSPACE/nanoarrow/nanoarrow.c" \
            -L/usr/local/lib -lmeos
          ./setspan_arrow_validate

  arrow_conformance:
    name: Arrow C Data Interface conformance (opaque and rigid geometry types)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev

      # Build MEOS with the circular buffer, pose and rigid geometry
      # subsystems so the opaque LargeBinary value leaf (temporal
      # geometry and geography, both core) and the rigid geometry
      # Struct{ref:LargeBinary, pose} value leaf are exercised. The
      # decomposed circular buffer cases are kept as a regression guard.
      - name: Build MEOS with circular buffers, poses and rigid geometries
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on \
            -DCBUFFER=on -DPOSE=on -DRGEO=on -DARROW=on ..
          make -j $(nproc)
          sudo make install

      # Compile the validator with the vendored dependency-free nanoarrow
      # amalgamation and run it. nanoarrow imports the MEOS-produced
      # ArrowSchema/ArrowArray with no MEOS knowledge and runs full Arrow
      # C Data Interface validation over the whole nested tree, proving the
      # opaque and rigid geometry exports are consumable by an external
      # Arrow engine.
      - name: Validate the Arrow export with nanoarrow
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          gcc -Wall -Werror=implicit-function-declaration -Werror=implicit-int -g -I/usr/local/include -I"$GITHUB_WORKSPACE" \
            -o temporal_arrow_validate temporal_arrow_validate.c \
            "$GITHUB_WORKSPACE/nanoarrow/nanoarrow.c" \
            -L/usr/local/lib -lmeos
          ./temporal_arrow_validate


  arrow_parquet_endtoend:
    name: Zero-MEOS Arrow and Parquet consumption end to end
    runs-on: ubuntu-latest
    # The end-to-end Parquet demo exercises the FULL family surface: it builds
    # pgPointCloud and H3 and round-trips every wired base and family type
    # (tint/tfloat/tbool/ttext/tbigint/tjsonb, the geometry/geography points,
    # cbuffer/npoint/pose, general geometry/geography, rigid geometry, the H3
    # and quadbin cell indexes and the point cloud) through MEOS export, Parquet
    # and a zero-MEOS consumer. It is an automatic per-commit gate alongside the
    # arrow conformance jobs above.

    steps:
      - uses: actions/checkout@v4

      # Prefer apt.postgresql.org over the runner's preinstalled PostgreSQL so
      # the postgresql-server-dev package resolves cleanly. Only pg_config
      # is needed here — pgPointCloud produces a static libpc.a, no server.
      - name: Remove existing PostgreSQL installations [prefer apt.postgresql.org]
        run: |
          sudo service postgresql stop || true
          sudo apt-get --purge remove postgresql* -y || true
          sudo rm -rf /var/lib/postgresql/ /etc/postgresql/ \
            /var/log/postgresql/ || true

      - name: Add PostgreSQL APT repository
        run: |
          sudo apt-get install -y curl ca-certificates gnupg
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt/ \
            $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeos-dev \
            libproj-dev \
            libjson-c-dev \
            libgsl-dev \
            libh3-dev \
            autoconf automake libtool libxml2-dev pkg-config \
            postgresql-17 postgresql-server-dev-17

      # The pgdg libh3-dev package's layout differs between releases.
      # Find both the header and the library at runtime and export them
      # so the cmake step can pin -DH3_INCLUDE_DIR / -DH3_LIBRARY
      # explicitly.
      - name: Locate libh3 on disk and pin its paths
        run: |
          dpkg -L libh3-dev || true
          H3_INC=$(dpkg -L libh3-dev | grep -E 'h3api\.h$' | head -1)
          H3_LIB=$(dpkg -L libh3-dev libh3-1 2>/dev/null | grep -E 'libh3\.so$' | head -1)
          if [ -z "$H3_INC" ] || [ -z "$H3_LIB" ]; then
            find /usr -name 'h3api.h' 2>/dev/null
            find /usr -name 'libh3*' 2>/dev/null
            echo "::error::could not locate libh3 headers/library"
            exit 1
          fi
          H3_INC_DIR=$(dirname "$H3_INC")
          echo "H3_INCLUDE_DIR=$H3_INC_DIR" >> $GITHUB_ENV
          echo "H3_LIBRARY=$H3_LIB" >> $GITHUB_ENV
          echo "Found libh3 headers at: $H3_INC_DIR"
          echo "Found libh3 library at: $H3_LIB"

      # pyarrow and duckdb are the strictly-required canonical-mirror
      # enablement for this verification: the zero-MEOS consumer and the
      # independent cross-check engine. They are the documented Arrow C
      # Data Interface and Parquet tooling the demo verifies against; the
      # demo cannot run without them. The MEOS export kernel is untouched.
      - name: Install the zero-MEOS Arrow and Parquet tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyarrow duckdb

      # MEOS's POINTCLOUD=ON build links pgPointCloud's static libpc.a,
      # produced as a side-effect of the upstream autotools build. The
      # source is vendored at pointcloud-pg/; run its autotools build to
      # harvest libpc.a.
      - name: Build pgPointCloud from source (for libpc.a)
        run: |
          cd pointcloud-pg
          ./autogen.sh
          ./configure \
            --with-pgconfig=/usr/lib/postgresql/17/bin/pg_config
          make -j $(nproc)
          ls -la lib/libpc.a

      # Build MEOS over the FULL temporal base type surface the per-type
      # Arrow conformance covers: scalars + geo points are always on;
      # -DCBUFFER -DPOSE -DRGEO -DNPOINT add the decomposed extended
      # tier; -DH3 adds the H3 index; -DPOINTCLOUD adds the point cloud
      # types. The libpc.a link, the meos_pointcloud.h / pgsql_compat.h
      # / meos_h3.h installs and the standalone pgPointCloud handler
      # init are the enablement without which the full-surface producer
      # cannot link or run.
      - name: Build MEOS over the full base type surface
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DMEOS=on \
            -DCBUFFER=on -DPOSE=on -DRGEO=on -DNPOINT=on \
            -DH3=on -DH3_INCLUDE_DIR="$H3_INCLUDE_DIR" \
            -DH3_LIBRARY="$H3_LIBRARY" \
            -DPOINTCLOUD=on -DQUADBIN=on -DARROW=on ..
          make -j $(nproc)
          sudo make install

      # The producer is the only MEOS-linked half. It is built as a
      # shared library from the install prefix (no source include path,
      # so the generated install meos.h is used); the vendored
      # pgPointCloud headers come from pointcloud-pg/lib. The zero-MEOS
      # Python bridge loads it with ctypes so the producer can fill
      # caller-owned ArrowSchema/ArrowArray structs through the
      # meos_temporal_to_arrow kernel. The installed meos_h3.h includes
      # <h3api.h>, so the pinned H3 include directory is added to the
      # compile line.
      - name: Build the MEOS-linked Arrow producer
        run: |
          cd meos/examples
          gcc -Wall -Wextra -Werror=implicit-function-declaration -Werror=implicit-int -fPIC -shared \
            -DCBUFFER=1 -DNPOINT=1 -DPOSE=1 -DRGEO=1 -DH3=1 \
            -DPOINTCLOUD=1 -DQUADBIN=1 -DJSON=1 \
            -I/usr/local/include -I"$H3_INCLUDE_DIR" \
            -I"$GITHUB_WORKSPACE/pointcloud-pg/lib" \
            -o libtemporal_arrow_parquet_producer.so \
            temporal_arrow_parquet_producer.c \
            -L/usr/local/lib -lmeos

      # Process 1: the bridge imports every MEOS-produced array (over the
      # full type surface) purely through pyarrow._import_from_c and writes
      # real per-type multi-row-group Parquet with zero-MEOS parquet-cpp.
      - name: Produce Arrow and write Parquet (pyarrow _import_from_c)
        run: |
          cd meos/examples
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
          python3 temporal_arrow_parquet_bridge.py \
            ./libtemporal_arrow_parquet_producer.so \
            "$RUNNER_TEMP/demo" \
            "$RUNNER_TEMP/demo_ground_truth.txt"

      # Process 2: a fully separate process with NO libmeos on its
      # library path (self-proven via /proc/self/maps). It only opens
      # the Parquet files and the MEOS-emitted decomposed ground truth,
      # measures the honest per-type row-group pruning on the flat
      # top-level columns, verifies every row field-exact against the
      # MEOS oracle, and cross-checks the prune with duckdb.
      - name: Consume, prune and verify (zero-MEOS process)
        run: |
          cd meos/examples
          unset LD_LIBRARY_PATH
          python3 temporal_arrow_parquet_consumer.py \
            "$RUNNER_TEMP/demo" \
            "$RUNNER_TEMP/demo_ground_truth.txt.decomposed"
