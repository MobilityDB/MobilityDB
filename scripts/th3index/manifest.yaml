  - h3_fn: h3_get_icosahedron_faces
    status: v2  # array-valued instants need tset<int> design
    args:     [h3index]
    ret:      integer[]
    temporal: {skip: "array return type"}

  # ---- Traversal (03-traversal.sql) ------------------------------------------
