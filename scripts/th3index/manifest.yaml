  - h3_fn: h3_get_index_digit
    status: v1
    args:     [h3index, integer]
    ret:      integer
    temporal:
      in_types: [th3index, integer]
      out_type: tint
      flavour:  lift_with_const

  - h3_fn: h3_is_valid_cell
    status: v1
    args:     [h3index]
    ret:      boolean
    temporal:
      in_types: [th3index]
      out_type: tbool
      flavour:  unary_scalar

  - h3_fn: h3_is_res_class_iii
    status: v1
    args:     [h3index]
