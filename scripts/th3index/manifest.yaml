# Source of truth for which h3-pg functions are temporalised and how.
# Each entry generates one MEOS lifted function + one PG V1 wrapper +
# one SQL CREATE FUNCTION + one smoke test.
#
# flavour legend:
#   unary_scalar     — f(h3index) -> scalar          lifts to f(th3index) -> t<scalar>
#   unary_geometry   — f(h3index) -> geometry        lifts to f(th3index) -> tgeometry (or tgeompoint)
#   lift_with_const  — f(X, const)                    second arg stays constant across instants
#   binary_synced    — f(h3index, h3index)           synchronised over shared time axis
#
# `status: v1` entries ship in the first cut. `status: v2` entries are
# the set-returning family; their static form ships as helpers on
# `h3index` returning `h3indexset` / `intset` (see
# `mobilitydb/sql/h3/260_h3index_sets.in.sql` +
# `meos/src/h3/h3index_sets.c`). The temporal lift for that family
# is deferred pending a `tset<T>` primitive design.

entries:

  # ---- Indexing (01-indexing.sql) -------------------------------------------
  - h3_fn: h3_latlng_to_cell
    status: v1
    args:     [point, integer]
    ret:      h3index
    temporal:
      in_types: [tgeogpoint, integer]   # geodetic canonical form
      out_type: th3index
      flavour:  lift_with_const

  # Also accept tgeompoint SRID 4326 for convenience, to avoid forcing
  # users to cast an existing tgeompoint column before feeding it in.
  - h3_fn: h3_latlng_to_cell
    status: v1
    args:     [point, integer]
    ret:      h3index
    temporal:
      in_types: [tgeompoint, integer]
      out_type: th3index
      flavour:  lift_with_const
      overload_note: "SRID must be 4326; enforced at bind time"

  - h3_fn: h3_cell_to_latlng
    status: v1
    args:     [h3index]
    ret:      point
    temporal:
      in_types: [th3index]
      out_type: tgeogpoint     # geodetic — lat/lng degrees, matches Q3 decision
      flavour:  unary_geometry

  - h3_fn: h3_cell_to_boundary
    status: v1
    args:     [h3index]
    ret:      polygon
    temporal:
      in_types: [th3index]
      out_type: tgeography
      flavour:  unary_geometry

  # ---- Inspection (02-inspection.sql) ---------------------------------------
  - h3_fn: h3_get_resolution
    status: v1
    args:     [h3index]
    ret:      integer
